<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GEO Scout — Sevenly Systems</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --green:#4F6B57;
    --gold:#C6A04D;
    --cream:#F7F4EE;
    --dark:#232323;
    --mid:#666;
    --light:#f0ede8;
    --border:#ddd;
    --red:#c0392b;
    --amber:#d68910;
    --success:#27ae60;
    --card:#fff;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;padding:2rem 1rem}
  .container{max-width:680px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:2.5rem}
  .bmark{width:42px;height:42px;display:flex;align-items:center;justify-content:center}
  .bmark img{width:42px;height:42px;object-fit:contain}
  .bname{font-size:17px;font-weight:600;color:var(--dark)}
  .bsub{font-size:11px;color:var(--mid);letter-spacing:0.08em;text-transform:uppercase;margin-top:1px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.25rem}
  .section-label{font-size:11px;font-weight:600;color:var(--mid);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.75rem}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--mid);margin-bottom:4px;font-weight:500}
  input[type=text],input[type=password]{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:#fff;color:var(--dark);outline:none;transition:border 0.15s}
  input:focus{border-color:var(--green)}
  .keys-wrap{background:var(--light);border-radius:10px;padding:1rem;margin-bottom:1rem}
  .keys-note{font-size:11px;color:var(--mid);margin-top:8px}
  .run-btn{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
  .run-btn:hover{background:#3d5544}
  .run-btn:disabled{opacity:0.45;cursor:default}
  .divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0}
  .step{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--light)}
  .step:last-child{border-bottom:none}
  .sico{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:13px}
  .sico.wait{background:#eee;color:#999}
  .sico.running{background:#e8f5e9;color:var(--green)}
  .sico.done{background:#e8f5e9;color:var(--success)}
  .sico.err{background:#fdecea;color:var(--red)}
  .st{font-size:13px;font-weight:600;color:var(--dark)}
  .sd{font-size:12px;color:var(--mid);margin-top:2px;line-height:1.5}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{width:13px;height:13px;border:2px solid var(--green);border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite}
  .score-row{display:flex;align-items:center;gap:16px;margin-bottom:1rem}
  .score-circ{width:66px;height:66px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
  .score-n{font-size:24px;font-weight:700;line-height:1}
  .score-d{font-size:10px;margin-top:2px;font-weight:500}
  .tag{display:inline-block;font-size:11px;padding:3px 8px;border-radius:6px;margin:2px;font-weight:500}
  .tg{background:#e8f5e9;color:#1b5e20}
  .ta{background:#fff8e1;color:#7f5600}
  .tr{background:#fdecea;color:#b71c1c}
  .finding{padding:10px 0;border-bottom:1px solid var(--light)}
  .finding:last-child{border-bottom:none}
  .fhead{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .dr{background:#e74c3c}.da{background:#f39c12}.dg{background:#27ae60}
  .ftitle{font-size:13px;font-weight:600;color:var(--dark)}
  .fbody{font-size:12px;color:var(--mid);line-height:1.6;padding-left:18px;margin-top:3px}
  .reclist{list-style:none;padding:0}
  .reclist li{font-size:13px;color:var(--dark);padding:8px 0;border-bottom:1px solid var(--light);display:flex;gap:10px;align-items:flex-start;line-height:1.5}
  .reclist li:last-child{border-bottom:none}
  .rnum{font-size:11px;font-weight:700;color:var(--green);background:#e8f5e9;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
  .vis-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
  .vchip{background:var(--light);border-radius:8px;padding:12px 8px;text-align:center}
  .vcname{font-size:11px;color:var(--mid);margin-bottom:5px;font-weight:500}
  .vcval{font-size:13px;font-weight:700}
  .vno{color:var(--red)}.vyes{color:var(--success)}
  .quote-box{background:var(--light);border-left:3px solid var(--green);padding:10px 14px;margin-top:12px;font-size:12px;color:var(--mid);line-height:1.7;font-style:italic;border-radius:0 6px 6px 0}
  .opp-card{background:var(--light);border-left:3px solid var(--green);padding:1rem 1.25rem;border-radius:0 8px 8px 0;margin-bottom:1.25rem}
  .action-btn{width:100%;padding:10px;background:#fff;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--dark);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;font-weight:500;transition:background 0.15s}
  .action-btn:hover{background:var(--light)}
  .errbox{background:#fdecea;border:1px solid #f5c6cb;border-radius:8px;padding:14px;font-size:13px;color:var(--red);margin-bottom:1rem;line-height:1.5}
  .badge-live{font-size:10px;background:#e8f5e9;color:#1b5e20;padding:2px 7px;border-radius:4px;margin-left:6px;font-weight:600;vertical-align:middle}
  .tags-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
  @media(max-width:500px){.grid2{grid-template-columns:1fr}.vis-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="bmark"><img src="logo.png" alt="Sevenly Systems" onerror="this.parentElement.innerHTML='<span style=\'font-weight:700;font-size:20px;color:#C6A04D;background:#4F6B57;width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center\'>7</span>'"/></div>
    <div>
      <div class="bname">GEO Scout</div>
      <div class="bsub">by Sevenly Systems</div>
    </div>
  </div>

  <div id="form-sec">
    <div class="card">
      <div class="section-label">Business details</div>
      <div class="grid2">
        <div class="field"><label>Business name</label><input type="text" id="bname" placeholder="Induction Consulting"/></div>
        <div class="field"><label>Website URL</label><input type="text" id="burl" placeholder="inductionconsulting.ca"/></div>
      </div>
      <div class="grid2">
        <div class="field"><label>City / region</label><input type="text" id="bloc" placeholder="Regina, Saskatchewan"/></div>
        <div class="field"><label>Service type</label><input type="text" id="bsvc" placeholder="organizational consulting"/></div>
      </div>
      <button class="run-btn" id="runbtn" onclick="runAudit()">&#x1F50D; Run GEO Scout</button>
    </div>
  </div>

  <div id="prog-sec" style="display:none">
    <div class="card">
      <div class="section-label">Running audit</div>
      <div id="steps-wrap"></div>
    </div>
  </div>

  <div id="report-sec" style="display:none"></div>
  <div id="err-sec" style="display:none"></div>
</div>

<script>
const STEPS=[
  {id:'perp',label:'Live Perplexity queries',desc:'Sending 3 real searches to Perplexity AI'},
  {id:'content',label:'Website content analysis',desc:'Evaluating copy structure, FAQs, and location signals'},
  {id:'entity',label:'Entity & directory check',desc:'Checking name and service consistency across the web'},
  {id:'authority',label:'Authority & citation signals',desc:'Finding what AI can cite as expertise'},
  {id:'report',label:'Generating report',desc:'Compiling findings and recommendations'}
];
let ss={};

function renderSteps(){
  document.getElementById('steps-wrap').innerHTML=STEPS.map(s=>{
    const st=ss[s.id]||'wait';
    let ico='';
    if(st==='wait')ico='&#9711;';
    if(st==='running')ico='<div class="spinner"></div>';
    if(st==='done')ico='&#10003;';
    if(st==='err')ico='&#10007;';
    return `<div class="step"><div class="sico ${st}">${ico}</div><div><div class="st">${s.label}</div><div class="sd" id="d-${s.id}">${s.desc}</div></div></div>`;
  }).join('');
}

function setStep(id,state,desc){
  ss[id]=state;renderSteps();
  if(desc){const el=document.getElementById('d-'+id);if(el)el.textContent=desc;}
}

async function callPerplexity(query){
  const res=await fetch('/api/perplexity',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({query})
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error('Perplexity error: '+(e.error||res.status));}
  return res.json();
}

async function callClaude(prompt){
  const res=await fetch('/api/claude',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({prompt})
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error('Claude error: '+(e.error||res.status));}
  return res.json();
}

async function runAudit(){
  const name=document.getElementById('bname').value.trim();
  const url=document.getElementById('burl').value.trim();
  const loc=document.getElementById('bloc').value.trim();
  const svc=document.getElementById('bsvc').value.trim();
  if(!name||!url||!loc||!svc){alert('Please fill in all business details.');return;}

  document.getElementById('form-sec').style.display='none';
  document.getElementById('prog-sec').style.display='block';
  document.getElementById('report-sec').style.display='none';
  document.getElementById('err-sec').style.display='none';
  STEPS.forEach(s=>ss[s.id]='wait');renderSteps();

  try{
    setStep('perp','running','Sending 6 live queries to Perplexity...');
    const q1=`best ${svc} in ${loc}`;
    const q2=`${svc} recommendation ${loc}`;
    const q3=`who should I hire for ${svc} in ${loc}`;
    const q4=`${loc} ${svc} reviews`;
    const q5=`top ${svc} ${loc} 2025`;
    const q6=`${svc} expert ${loc}`;
    const [r1,r2,r3,r4,r5,r6]=await Promise.all([
      callPerplexity(q1),
      callPerplexity(q2),
      callPerplexity(q3),
      callPerplexity(q4),
      callPerplexity(q5),
      callPerplexity(q6)
    ]);
    const bl=name.toLowerCase();
    const a1=r1.answer.toLowerCase().includes(bl);
    const a2=r2.answer.toLowerCase().includes(bl);
    const a3=r3.answer.toLowerCase().includes(bl);
    const a4=r4.answer.toLowerCase().includes(bl);
    const a5=r5.answer.toLowerCase().includes(bl);
    const a6=r6.answer.toLowerCase().includes(bl);
    const appearCount=[a1,a2,a3,a4,a5,a6].filter(Boolean).length;
    const perpData={queries:[
      {q:q1,answer:r1.answer,appears:a1},
      {q:q2,answer:r2.answer,appears:a2},
      {q:q3,answer:r3.answer,appears:a3},
      {q:q4,answer:r4.answer,appears:a4},
      {q:q5,answer:r5.answer,appears:a5},
      {q:q6,answer:r6.answer,appears:a6}
    ],appearCount};
    setStep('perp','done',`Completed — appeared in ${appearCount}/6 real Perplexity searches`);

    setStep('content','running');
    const content=await callClaude(`Analyze GEO readiness for this business.
Business: "${name}" | URL: "${url}" | Service: "${svc}" | Location: "${loc}"
Evaluate: question-based copy vs marketing copy, FAQ presence, geographic signals, service specificity, social proof.
Return JSON: {"score":35,"question_based_copy":{"rating":"poor|fair|good","finding":"specific observation"},"faq_presence":{"rating":"poor|fair|good","finding":"specific observation"},"geo_signals":{"rating":"poor|fair|good","finding":"specific observation"},"service_specificity":{"rating":"poor|fair|good","finding":"specific observation"},"social_proof":{"rating":"poor|fair|good","finding":"specific observation"}}`);
    setStep('content','done','Content analysis complete');

    setStep('entity','running');
    const entity=await callClaude(`Assess entity consistency and directory presence for GEO.
Business: "${name}" | URL: "${url}" | Service: "${svc}" | Location: "${loc}"
Evaluate Google Business presence, LinkedIn, industry directories, name/location/service consistency across platforms.
Return JSON: {"score":40,"overall_rating":"poor|fair|good","key_finding":"1-2 sentence main finding","missing_platforms":["platform1","platform2","platform3"],"gaps":["gap1","gap2"]}`);
    setStep('entity','done','Entity check complete');

    setStep('authority','running');
    const authority=await callClaude(`Assess authority and citation signals for GEO purposes.
Business: "${name}" | URL: "${url}" | Service: "${svc}" | Location: "${loc}"
Evaluate citeable content (articles, guides, thought leadership), third-party mentions, expert positioning.
Return JSON: {"score":30,"overall_rating":"poor|fair|good","key_finding":"1-2 sentence main finding","citeable_content":{"exists":false,"detail":"what exists or is missing"},"expert_positioning":{"rating":"poor|fair|good","detail":"assessment"}}`);
    setStep('authority','done','Authority check complete');

    setStep('report','running');
    const report=await callClaude(`Create a GEO audit report for a client debrief.
Business: "${name}" | Location: "${loc}" | Service: "${svc}"
Perplexity: appeared in ${perpData.appearCount}/6 real searches across 6 different query types.
Sample Perplexity answer for "${q1}": "${r1.answer.slice(0,300)}"
Content score: ${content.score} | Entity score: ${entity.score} | Authority score: ${authority.score}
Be specific, honest, and actionable. This will be shown directly to the business owner.
Return JSON: {"overall_score":35,"headline":"one punchy honest sentence about their GEO situation","top_gaps":[{"severity":"critical|moderate|minor","title":"gap title","detail":"specific detail for this business"},{"severity":"critical|moderate|minor","title":"gap title","detail":"specific detail"},{"severity":"critical|moderate|minor","title":"gap title","detail":"specific detail"}],"recommendations":["Specific action 1 — what to do and why","Specific action 2","Specific action 3","Specific action 4"],"opportunity_statement":"2-3 sentences on what improved GEO visibility could mean for this specific business"}`);
    setStep('report','done','Report ready');

    renderReport({name,loc,svc,perpData,content,entity,authority,report,q1,r1});

  }catch(err){
    STEPS.forEach(s=>{if(ss[s.id]==='running')setStep(s.id,'err');});
    document.getElementById('err-sec').style.display='block';
    document.getElementById('prog-sec').style.display='none';
    document.getElementById('err-sec').innerHTML=`<div class="errbox"><strong>Something went wrong:</strong><br>${err.message}<br><br>Check your API keys and try again.</div><button class="action-btn" onclick="resetForm()">&#8635; Try again</button>`;
  }
}

function sc(s){
  if(s>=65)return{bg:'#e8f5e9',tc:'#1b5e20'};
  if(s>=40)return{bg:'#fff8e1',tc:'#7f5600'};
  return{bg:'#fdecea',tc:'#b71c1c'};
}
function tcls(r){return r==='good'?'tg':r==='fair'?'ta':'tr';}
function dcls(sev){return sev==='critical'?'dr':sev==='moderate'?'da':'dg';}

function renderReport({name,loc,svc,perpData,content,entity,authority,report,q1,r1}){
  const rs=document.getElementById('report-sec');
  rs.style.display='block';
  document.getElementById('prog-sec').style.display='none';
  const c=sc(report.overall_score);
  const visChips=perpData.queries.map((q,i)=>`<div class="vchip"><div class="vcname" title="${q.q}">Query ${i+1}</div><div class="vcval ${q.appears?'vyes':'vno'}">${q.appears?'Found':'Not found'}</div></div>`).join('');
  const gaps=report.top_gaps.map(g=>`<div class="finding"><div class="fhead"><div class="dot ${dcls(g.severity)}"></div><div class="ftitle">${g.title} <span class="tag ${g.severity==='critical'?'tr':g.severity==='moderate'?'ta':'tg'}">${g.severity}</span></div></div><div class="fbody">${g.detail}</div></div>`).join('');
  const recs=report.recommendations.map((r,i)=>`<li><div class="rnum">${i+1}</div><span>${r}</span></li>`).join('');
  const snippet=r1.answer.slice(0,240)+(r1.answer.length>240?'...':'');

  rs.innerHTML=`
    <div class="card">
      <div class="section-label">GEO Scout report — ${name}</div>
      <div class="score-row">
        <div class="score-circ" style="background:${c.bg}">
          <div class="score-n" style="color:${c.tc}">${Math.round(report.overall_score)}</div>
          <div class="score-d" style="color:${c.tc}">/100</div>
        </div>
        <div>
          <div style="font-size:15px;font-weight:600;color:#232323;margin-bottom:5px">${report.headline}</div>
          <div style="font-size:12px;color:#666">${loc} &middot; ${svc}</div>
        </div>
      </div>
      <div class="divider" style="margin:0.75rem 0"></div>
      <div style="font-size:13px;font-weight:600;margin-bottom:6px">Perplexity visibility <span class="badge-live">live data</span></div>
      <div style="font-size:12px;color:#666;margin-bottom:4px">Appeared in <strong>${perpData.appearCount}</strong> of 6 real Perplexity searches for "${svc}" in ${loc}</div>
      <div class="vis-grid">${visChips}</div>
      <div class="quote-box">${snippet}</div>
    </div>

    <div class="card">
      <div class="section-label">Key gaps</div>
      ${gaps}
    </div>

    <div class="card">
      <div class="section-label">Content & entity signals</div>
      <div class="tags-wrap">
        <span class="tag ${tcls(content.question_based_copy.rating)}">Question copy: ${content.question_based_copy.rating}</span>
        <span class="tag ${tcls(content.faq_presence.rating)}">FAQ: ${content.faq_presence.rating}</span>
        <span class="tag ${tcls(content.geo_signals.rating)}">Location signals: ${content.geo_signals.rating}</span>
        <span class="tag ${tcls(content.social_proof.rating)}">Social proof: ${content.social_proof.rating}</span>
        <span class="tag ${tcls(entity.overall_rating)}">Entity consistency: ${entity.overall_rating}</span>
        <span class="tag ${tcls(authority.expert_positioning.rating)}">Expert positioning: ${authority.expert_positioning.rating}</span>
      </div>
      <div style="font-size:12px;color:#666;line-height:1.6">${entity.key_finding}</div>
    </div>

    <div class="card">
      <div class="section-label">Recommendations</div>
      <ul class="reclist">${recs}</ul>
    </div>

    <div class="opp-card">
      <div class="section-label" style="margin-bottom:0.5rem">The opportunity</div>
      <div style="font-size:13px;color:#232323;line-height:1.7">${report.opportunity_statement}</div>
    </div>

    <button class="action-btn" onclick="resetForm()">&#8635; Run another audit</button>
  `;
}

window.addEventListener('load',()=>{
  const ck=localStorage.getItem('geo_scout_ckey');
  const pk=localStorage.getItem('geo_scout_pkey');
  if(ck)document.getElementById('ckey').value=ck;
  if(pk)document.getElementById('pkey').value=pk;
});

function resetForm(){
  document.getElementById('form-sec').style.display='block';
  document.getElementById('prog-sec').style.display='none';
  document.getElementById('report-sec').style.display='none';
  document.getElementById('err-sec').style.display='none';
  STEPS.forEach(s=>ss[s.id]='wait');
}
</script>
</body>
</html>
